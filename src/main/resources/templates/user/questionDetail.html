<!DOCTYPE html>
<html lang="ko" th:replace="~{layout :: layout(~{::title}, ~{::main}, ~{::script})}">
<head>
    <title>질문 상세페이지</title>
</head>
<body>
<main class="container">
    <div class="py-5 text-center">
        <h2 th:text="${question.subject}">질문 상세페이지</h2>
    </div>

    <!-- 질문 내용 -->
    <div class="card my-3">
        <div class="card-body">
            <div class="card-text" style="white-space: pre-line;" th:text="${question.content}">내용</div>
            <div class="d-flex justify-content-end">
                <div class="badge bg-light text-dark p-2 text-start">
                    <div class="mb-2">
                        <span th:if="${question.author != null}" th:text="${question.author.loginId}">글쓴이</span>
                    </div>
                    <div th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}">작성일</div>
                </div>
            </div>
            <!-- 질문 수정/삭제 버튼: 로그인사용자 == 작성자일 때만 표시 -->
            <div class="my-3">
                <a th:href="@{|/question/modify/${question.id}|}"
                   class="btn btn-sm btn-outline-secondary"
                   th:if="${loginMember != null and question.author != null
                            and loginMember.loginId == question.author.loginId}">수정</a>
                <!-- 삭제: 바로 이동 X, 모달을 여는 버튼 -->
                <button type="button" class="btn btn-sm btn-outline-danger"
                        data-bs-toggle="modal" data-bs-target="#questionDeleteModal"
                        th:if="${loginMember != null and question.author != null
                                 and loginMember.loginId == question.author.loginId}">삭제</button>
            </div>

            <!-- 질문 삭제 확인 모달 -->
            <div class="modal fade" id="questionDeleteModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">삭제 확인</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            정말로 이 질문을 삭제하시겠습니까? 답변도 함께 삭제됩니다.
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                            <!-- 확인 = 실제 삭제 주소로 이동 -->
                            <a th:href="@{|/question/delete/${question.id}|}" class="btn btn-danger">삭제</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 답변 개수 -->
    <h5 class="border-bottom my-3 py-2"
        th:text="|${#lists.size(question.answerList)}개의 답변이 있습니다.|">답변 수</h5>

    <!-- 답변 목록 -->
    <div class="card my-3" th:each="answer : ${question.answerList}">
        <div class="card-body">
            <div class="card-text" style="white-space: pre-line;" th:text="${answer.content}">답변 내용</div>
            <div class="d-flex justify-content-end">
                <div class="badge bg-light text-dark p-2 text-start">
                    <div th:text="${answer.author != null ? answer.author.loginId : 'Unknown'}">작성자</div>
                    <div th:text="${#temporals.format(answer.createDate, 'yyyy-MM-dd HH:mm')}">작성일</div>
                </div>
            </div>
            <!-- 답변 수정/삭제 버튼: 반복문 안 → answer 변수 사용 가능 -->
            <div class="my-3">
                <a th:href="@{|/answer/modify/${answer.id}|}"
                   class="btn btn-sm btn-outline-secondary"
                   th:if="${loginMember != null and answer.author != null
                            and loginMember.loginId == answer.author.loginId}">수정</a>
                <!-- 답변 삭제: 모달 id에 answer.id를 붙여 답변마다 다르게 -->
                <button type="button" class="btn btn-sm btn-outline-danger"
                        th:attr="data-bs-target=|#answerDeleteModal${answer.id}|"
                        data-bs-toggle="modal"
                        th:if="${loginMember != null and answer.author != null
                                 and loginMember.loginId == answer.author.loginId}">삭제</button>
            </div>

            <!-- 답변 삭제 확인 모달 (답변별 고유 id) -->
            <div class="modal fade" th:id="|answerDeleteModal${answer.id}|" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">삭제 확인</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">정말로 이 답변을 삭제하시겠습니까?</div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                            <a th:href="@{|/answer/delete/${answer.id}|}" class="btn btn-danger">삭제</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 답변 등록 폼 -->
    <form th:action="@{|/answer/create/${question.id}|}" th:object="${answerForm}" method="post" class="my-3 text-end">
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger text-start">
            <div th:each="err : ${#fields.allErrors()}" th:text="${err}"></div>
        </div>
        <textarea th:field="*{content}" rows="5" class="form-control"></textarea>
        <input type="submit" value="답변 등록" class="btn btn-dark my-2">
    </form>

    <a th:href="@{/question/list}" class="btn btn-secondary">목록으로</a>
</main>
<script></script>
</body>
</html>
