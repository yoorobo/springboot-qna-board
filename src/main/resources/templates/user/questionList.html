<!DOCTYPE html>
<html lang="ko" th:replace="~{layout :: layout(~{::title}, ~{::main}, ~{::script})}">
<head>
    <title>질문 목록</title>
</head>
<body>
<main class="container">
    <div class="py-5 text-center">
        <h2>질문 목록</h2>
    </div>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th scope="col">번호</th>
            <th scope="col" class="w-50">제목</th>
            <th scope="col">글쓴이</th>
            <th scope="col">작성일자</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="question : ${questionList}">
            <th th:text="${question.id}">번호</th>
            <td>
                <a th:text="${question.subject}" th:href="@{/question/detail/{id}(id=${question.id})}">제목</a>
            </td>
            <td th:text="${question.author != null ? question.author.loginId : 'Unknown'}">글쓴이</td>
            <td th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd')}">작성일자</td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/question/create}" class="btn btn-dark" role="button">질문 등록하기</a>
</main>
<script></script>
</body>
</html>
