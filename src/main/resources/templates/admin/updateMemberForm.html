<!DOCTYPE html>
<html lang="ko" th:replace="~{layout :: layout(~{::title}, ~{::main}, ~{::script})}">
<head>
    <title>회원 수정</title>
</head>
<body>
<main class="container max600">
    <div class="py-5 text-center">
        <h2>회원 수정</h2>
    </div>
    <h4 class="mb-3">회원 정보 입력</h4>
    <form th:action  th:Object="${memberForm}"  method="post">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label th:for="loginId" class="form-label">로그인 ID</label>
            <input type="text" class="form-control" th:field="*{loginId}" readonly>
            <div th:errors="*{loginId}" class="field-error"></div>
        </div>
        <div class="mb-3">
            <label th:for="password" class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}"
                   th:placeholder="|비밀번호는 *{password}입니다.|">
            <div th:errors="*{password}" class="field-error"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:for="name">이름</label>
            <input type="text" class="form-control" th:field="*{name}">
            <div th:errors="*{name}" class="field-error"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:for="grade">등급</label>
            <input type="text" class="form-control" th:field="*{grade}">
            <div th:errors="*{grade}" class="field-error"></div>
        </div>
        <div class="row">
            <div class="col">
                <button type="submit" class="w-100 btn btn-primary">회원수정</button>
            </div>
            <div class="col">
                <button type="button" class="w-100 btn btn-secondary"
                        th:onclick="|location.href='@{/}'|">취소</button>
            </div>
        </div>
    </form>
</main>
<script></script>
</body>
</html>
