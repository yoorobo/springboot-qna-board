<!DOCTYPE html>
<html lang="ko" th:replace="~{layout :: layout(~{::title}, ~{::main}, ~{::script})}">
<head>
    <title>home</title>
</head>
<body>
<main class="container text-center max600">
    <div class="py-5">
        <h2>홈 화면</h2>
    </div>
    <div class="row">
        <div th:if="${loginMember}" class="row">
            <p class="mb-3 col-7 fw-bold text-end"
               th:text="|${loginMember.name}님 환영합니다.|"></p>
            <form class="col-5 text-start" th:action="@{/logout}" method="post">
                <button class="btn btn-dark btn-sm">로그아웃</button>
            </form>
        </div>
        <div class="col-md mb-3 mb-md-0" th:unless="${loginMember}">
            <button type="button" class="w-100 btn btn-secondary btn-lg" th:onclick="|location.href='@{/add}'|">회원 가입</button>
        </div>
        <!-- 회원 목록: admin 등급만 표시 -->
        <div class="col-md mb-3 mb-md-0" th:if="${loginMember != null and loginMember.grade == 'admin'}">
            <button type="button" class="w-100 btn btn-dark btn-lg" th:onclick="|location.href='@{/members}'|">회원 목록</button>
        </div>
        <div class="col-md mb-3 mb-md-0" th:if="${loginMember}">
            <button type="button" class="w-100 btn btn-dark btn-lg" th:onclick="|location.href='@{/question/create}'|">질문 등록하기</button>
        </div>
        <div class="col-md mb-3 mb-md-0" th:if="${loginMember}">
            <button type="button" class="w-100 btn btn-dark btn-lg" th:onclick="|location.href='@{/question/list}'|">질문 목록</button>
        </div>
        <div class="col-md mb-3 mb-md-0" th:unless="${loginMember}">
            <button type="button" class="w-100 btn btn-dark btn-lg"
                    th:onclick="|location.href='@{/login}'|">로그인</button>
        </div>
    </div>
</main>
<script>
</script>
</body>
</html>
